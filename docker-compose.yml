version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: factory_db
    environment:
      POSTGRES_DB: factory_brain
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d factory_brain" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend_fastapi
    container_name: factory_backend
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/factory_brain
      - CORS_ORIGINS=http://localhost:5173,http://localhost:5174,http://localhost:3000
      - DATA_DIR=/app/Data
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CLEANED_DATA_OUTPUT_DIR=/app/cleaned_data_output
    ports:
      - "8000:8000"
    volumes:
      - ./frontend/Data:/app/Data # Map your CSV data folder
      - ./cleaned_data_output:/app/cleaned_data_output
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:6.2-alpine
    container_name: factory_redis
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: factory_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: factory_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
