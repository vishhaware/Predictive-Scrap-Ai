version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: factory_db
    environment:
      POSTGRES_DB: factory_brain
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d factory_brain" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend_fastapi
    container_name: factory_backend
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/factory_brain
      - CORS_ORIGINS=http://localhost:5173,http://localhost:5174,http://localhost:3000
      - DATA_DIR=/app/Data
    ports:
      - "8000:8000"
    volumes:
      - ./frontend/Data:/app/Data # Map your CSV data folder
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
